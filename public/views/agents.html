<div class="view-header">
    <div class="header-text">
        <h2>Compliance Agents</h2>
        <p>Manage and configure your fleet of specialized accessibility agents.</p>
    </div>
    <div class="header-actions">
        <button class="secondary-btn stop-all-btn" onclick="stopAllAgents()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
            <span>Shutdown Fleet</span>
        </button>
        <button class="run-btn" onclick="deployFleet()">
            <div class="play-icon-circle">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
            <span>Deploy Fleet</span>
        </button>
    </div>
</div>

<div class="fleet-overview">
    <div class="stat-card">
        <div class="stat-icon-wrap primary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>
        <div class="stat-content">
            <span class="stat-label">Active Agents</span>
            <div class="stat-value"><span id="stat-active-agents">0</span><span class="stat-total">/ <span id="stat-total-agents">0</span></span></div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon-wrap success">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div class="stat-content">
            <span class="stat-label">Fleet Health</span>
            <div id="stat-fleet-health" class="stat-value">0%</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon-wrap warning">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
        </div>
        <div class="stat-content">
            <span class="stat-label">Avg. Settings</span>
            <div id="stat-avg-coverage" class="stat-value">0</div>
        </div>
    </div>
</div>

<div class="agents-controls">
    <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="agent-search" placeholder="Search agents by name, skill, or role..." oninput="handleAgentSearch(this.value)">
    </div>
    <div class="filter-chips" id="agent-category-filters">
        <button class="filter-chip active" onclick="filterAgentsByCategory('all')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <span>All Agents</span>
        </button>
        <button class="filter-chip" onclick="filterAgentsByCategory('detection')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>Detection</span>
        </button>
        <button class="filter-chip" onclick="filterAgentsByCategory('analysis')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
            <span>Analysis</span>
        </button>
        <button class="filter-chip" onclick="filterAgentsByCategory('validation')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span>Validation</span>
        </button>
        <button class="filter-chip" onclick="filterAgentsByCategory('structure')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            <span>Structure</span>
        </button>
        <button class="filter-chip" onclick="filterAgentsByCategory('interaction')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5"/></svg>
            <span>Interaction</span>
        </button>
        <button class="filter-chip" onclick="filterAgentsByCategory('navigation')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            <span>Navigation</span>
        </button>
    </div>
</div>

<div id="agents-list" class="agents-container">
    <!-- Dynamic agent categories and cards -->
</div>

<!-- Configuration Modal -->
<div id="config-modal" class="modal-overlay">
    <div class="modal-container glass-effect">
        <div class="modal-header">
            <div class="modal-title-wrap">
                <div id="modal-agent-icon" class="modal-agent-icon"></div>
                <div class="modal-text">
                    <h3 id="modal-agent-title">Agent Settings</h3>
                    <p id="modal-agent-subtitle">Configure operational parameters</p>
                </div>
            </div>
            <button class="close-modal" onclick="closeAgentConfig()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="modal-body">
            <form id="agent-config-form">
                <div id="modal-settings-content">
                    <!-- Settings will be injected here dynamically -->
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="secondary-btn" onclick="closeAgentConfig()">Cancel</button>
            <button class="primary-btn" onclick="saveAgentConfig()">
                <span>Save Configuration</span>
            </button>
        </div>
    </div>
</div>
